pre-commit:
  commands:
    check:
      run: pnpm lint {staged_files}
      glob: "*.{js,jsx,.mjs,,ts,tsx,mts,css,json,md}"
      stage_fixed: true

pre-push:
  commands:
    lint:
      glob: "*.{ts,tsx,js,jsx}"
      run: pnpm lint
    test:
      glob: "*.{ts,tsx,js,jsx}"
      run: pnpm test:cov
